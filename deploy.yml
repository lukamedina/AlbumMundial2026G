name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:       # permite ejecutarlo manualmente desde GitHub Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # ── Genera firebase-config.js a partir de los GitHub Secrets ────
      # Ir a: Repo → Settings → Secrets and variables → Actions → New secret
      # Crear uno por cada variable de abajo con los valores reales.
      - name: ⚙️ Generar firebase-config.js desde GitHub Secrets
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:      ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const cfg = {
            apiKey:            process.env.FIREBASE_API_KEY,
            authDomain:        process.env.FIREBASE_AUTH_DOMAIN,
            projectId:         process.env.FIREBASE_PROJECT_ID,
            storageBucket:     process.env.FIREBASE_STORAGE_BUCKET,
            messagingSenderId: process.env.FIREBASE_MESSAGING_SENDER_ID,
            appId:             process.env.FIREBASE_APP_ID,
            measurementId:     process.env.FIREBASE_MEASUREMENT_ID,
          };
          fs.writeFileSync('firebase-config.js',
            'window.FIREBASE_CONFIG = ' + JSON.stringify(cfg, null, 2) + ';\n'
          );
          console.log('✅ firebase-config.js generado con éxito');
          EOF

      - name: 📝 Crear .nojekyll (evita que GitHub Pages procese el HTML)
        run: touch .nojekyll

      - name: 📄 Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
